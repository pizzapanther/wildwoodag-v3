{% extends "blessed/base.html" %}{% load pubcrank %}
{% block banner %}
<div class="page-header" style="padding: 120px 0 0 0">
  <div class="container">
    <div>
      <div style="text-align: center;">
        <strong><a href="/pastors-pen/">Pastor's Pen</a></strong>
      </div>
      <h1 class="text-center page-title fw-medium" style="margin: 0 auto;">
        {{ page.title }}
      </h1>
      <h6 style="text-align: center;"><em>{{ page.date|date:"m/d/Y" }}</em></h6>
    </div>
  </div>
</div>
{% endblock %}
{% block sections %}
<section class="pb-110px position-relative">
  <div class="container">
    <div class="row" style="padding-top: 30px;">
      <div class="col-lg-8 col-10" style="margin: 0 auto;">
        <img src="{{ page.image }}" alt="" style="width: 100%; height: 300px; object-fit: cover; margin-bottom: 20px; border-radius: 15px;">
        {{ page.body|safe }}
      </div>
    </div>
  </div>
</section>
{% endblock %}
